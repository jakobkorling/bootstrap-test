<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/index.css">
    <title>Photography</title>
</head>
<body>
    <section class="bg-dark text-white text-center py-5 hero">
        <div>
            <h1 class="display-4">Photographer</h1>
            <p class="lead">Photo Gallery</p>
        </div>
    </section>

    <main> 
        <section class="container my-5 gallery">
            <div class="row g-4">
                <div class="col-md-4">
                    <img src="images/img1.jpg" alt="" class="img-fluid rounded">
                </div>                
                <div class="col-md-4">
                    <img src="images/img2.jpg" alt="" class="img-fluid rounded">
                </div>
                <div class="col-md-4">
                    <img src="images/img3.jpg" alt="" class="img-fluid rounded">
                </div>
                <div class="col-md-4">
                    <img src="images/img4.jpg" alt="" class="img-fluid rounded">
                </div>
                <div class="col-md-4">
                    <img src="images/img5.jpg" alt="" class="img-fluid rounded">
                </div>
                <div class="col-md-4">
                    <img src="images/img6.jpg" alt="" class="img-fluid rounded">
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-light text-center py-4">
        <p>Photographer 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
